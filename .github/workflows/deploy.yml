# Deploy PHD Studio: SSH no servidor e executa deploy-remote.sh (Docker)
# Sincronização Git: exclusivamente em deploy/docker/scripts/deploy-remote.sh (sync_to_remote)
name: Deploy to Server

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SSH_PORT: ${{ secrets.SERVER_SSH_PORT || '22' }}

    steps:
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.7.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

    - name: Test server connectivity
      timeout-minutes: 2
      continue-on-error: true
      run: |
        echo "🔍 Testando conectividade com o servidor..."
        echo "IP do servidor: ${{ secrets.SERVER_HOST }}"

        if ping -c 2 -W 5 ${{ secrets.SERVER_HOST }} 2>/dev/null; then
          echo "✅ Ping respondeu"
        else
          echo "⚠️ Ping não respondeu (pode ser normal se ICMP estiver bloqueado)"
        fi

        echo "🔌 Testando porta SSH (${{ env.SSH_PORT }})..."
        PORT_ACCESSIBLE=false
        for i in {1..3}; do
          if timeout 5 bash -c "echo > /dev/tcp/${{ secrets.SERVER_HOST }}/${{ env.SSH_PORT }}" 2>/dev/null; then
            echo "✅ Porta ${{ env.SSH_PORT }} está acessível (tentativa $i/3)"
            PORT_ACCESSIBLE=true
            break
          else
            echo "⚠️ Tentativa $i/3: Porta ${{ env.SSH_PORT }} não acessível"
            if [ $i -lt 3 ]; then
              sleep 2
            fi
          fi
        done

        if [ "$PORT_ACCESSIBLE" = "false" ]; then
          echo "⚠️ Porta ${{ env.SSH_PORT }} não acessível — continuando com teste SSH direto"
        fi

    - name: Test SSH connection
      timeout-minutes: 2
      run: |
        echo "🔑 Testando conexão SSH (porta ${{ env.SSH_PORT }})..."
        ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o BatchMode=yes \
            -p ${{ env.SSH_PORT }} \
            root@${{ secrets.SERVER_HOST }} 'echo "✅ Conexão SSH OK"' || {
          echo "❌ Falha ao conectar via SSH"
          echo "Verifique:"
          echo "  1. Chave SSH no GitHub Secrets (SSH_PRIVATE_KEY)"
          echo "  2. Servidor acessível (${{ secrets.SERVER_HOST }}:${{ env.SSH_PORT }})"
          echo "  3. Guia: docs/troubleshooting-deploy-ssh.md"
          exit 1
        }

    - name: Deploy to server (Docker / Traefik)
      timeout-minutes: 12
      run: |
        echo "🚀 Iniciando deploy remoto (sync Git + Docker em deploy-remote.sh)..."
        ssh -o StrictHostKeyChecking=no \
            -o ConnectTimeout=20 \
            -o ServerAliveInterval=30 \
            -o ServerAliveCountMax=3 \
            -o BatchMode=yes \
            -p ${{ env.SSH_PORT }} \
            root@${{ secrets.SERVER_HOST }} '
          set -e
          cd /root/phdstudio || exit 1
          chmod +x deploy/docker/scripts/deploy-remote.sh
          ./deploy/docker/scripts/deploy-remote.sh
        '

    - name: Notify deployment
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deploy concluído com sucesso!"
        else
          echo "❌ Deploy falhou!"
          echo ""
          echo "Troubleshooting:"
          echo "1. Verifique se o servidor está online"
          echo "2. Verifique porta SSH: ${{ env.SSH_PORT }}"
          echo "3. Logs no servidor: docker logs phdstudio-app"
          echo "4. Guia: docs/troubleshooting-deploy-ssh.md"
        fi
